<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Tahoma&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "win-gray": "#f0f0f0",
                        "win-border": "#a0a0a0",
                        "win-dark-gray": "#808080",
                        "win-blue": "#005a9e",
                        "win-light-blue": "#cce4f7",
                    },
                    fontFamily: {
                        "win": ["Tahoma", "Segoe UI", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #000;
        }
        .edit-song-modal {
            color: #111827;
        }
        .edit-song-modal .material-symbols-outlined {
            color: #1f2937;
        }
        .edit-song-modal .win-button,
        .edit-song-modal .toolbar-btn,
        .edit-song-modal select,
        .edit-song-modal input,
        .edit-song-modal label,
        .edit-song-modal span {
            color: #111827;
        }
        .edit-song-modal .text-win-dark-gray {
            color: #374151;
        }
        .edit-song-modal .text-win-blue {
            color: #005a9e;
        }
        .edit-song-modal .win-button,
        .edit-song-modal .toolbar-btn {
            color: #111827;
        }
        .win-button {
            border: 1px solid #707070;
            background: linear-gradient(to bottom, #f0f0f0, #e1e1e1);
            padding: 2px 12px;
            min-width: 75px;
            height: 24px;
        }
        .win-button:hover {
            background: linear-gradient(to bottom, #e5f1fb, #cce4f7);
            border-color: #0078d7;
        }
        .win-button:active {
            background: #cce4f7;
        }
        .toolbar-btn {
            height: 22px;
            width: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
        }
        .toolbar-btn:hover {
            background-color: #cce4f7;
            border-color: #005a9e;
        }
        .toolbar-btn.active {
            background-color: #a3cdf0;
            border-color: #005a9e;
        }
        .divider {
            width: 1px;
            height: 18px;
            background-color: #ccc;
            margin: 0 4px;
        }
        .tab-active {
            background-color: #fff;
            border-bottom: none;
            position: relative;
            z-index: 10;
        }
        /* Dashboard Background Simulation */
        .dashboard-bg {
            background-color: #2b2b2b;
            background-image: linear-gradient(45deg, #333 25%, transparent 25%), linear-gradient(-45deg, #333 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #333 75%), linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
<title>EasyWorship - Edit Song</title>
</head>
<body class="dashboard-bg h-screen flex items-center justify-center p-4">
<!-- Dimmed Overlay -->
<div class="fixed inset-0 bg-black/50 z-0"></div>
<!-- Modal Container -->
<div class="edit-song-modal relative z-10 w-full max-w-6xl h-[85vh] bg-win-gray flex flex-col overflow-hidden shadow-2xl border border-win-dark-gray ring-1 ring-white/20">
<!-- Modal Title Bar (Simulating OS Window) -->
<div class="bg-slate-100 px-2 py-1 flex items-center justify-between border-b border-win-border shrink-0">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">music_note</span>
<span class="text-[11px] font-semibold">Edit Song - Amazing Grace</span>
</div>
<div class="flex items-center gap-1">
<button class="w-6 h-5 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors text-slate-700" onclick="window.close()">
<span class="material-symbols-outlined text-xs">close</span>
</button>
</div>
</div>
<!-- Top Toolbar Header -->
<header class="bg-win-gray border-b border-win-border flex flex-col shrink-0">
<!-- New Song Title Row -->
<div class="px-2 py-1.5 flex items-center gap-2 border-b border-win-border/50">
<label class="text-[11px] font-semibold text-win-dark-gray" for="song-title">Song Title:</label>
<input class="flex-1 h-6 border border-win-border px-2 text-[12px] focus:outline-none focus:border-win-blue" id="song-title" placeholder="Enter song name..." type="text"/>
</div>
<!-- Formatting Toolbar Row -->
                <div class="p-1 flex items-center gap-1">
                    <select class="h-6 border border-win-border bg-white text-[11px] px-1 w-44">
<option>Tahoma</option>
<option>Arial</option>
<option>Verdana</option>
</select>
<select class="h-6 border border-win-border bg-white text-[11px] px-1 w-24">
<option>Auto</option>
<option>12</option>
<option>24</option>
<option>48</option>
</select>
<div class="divider"></div>
<button class="toolbar-btn text-[10px] font-bold">A<span class="text-[8px] translate-y-[-2px]">▼</span></button>
<button class="toolbar-btn text-[12px] font-bold">A<span class="text-[8px] translate-y-[-2px]">▲</span></button>
<div class="divider"></div>
<div class="flex items-center gap-px border border-win-border bg-white px-1 h-6">
<div class="w-4 h-4 border border-slate-300 bg-white"></div>
<span class="material-symbols-outlined text-[12px] text-win-dark-gray">arrow_drop_down</span>
</div>
<div class="divider"></div>
<div class="flex gap-0.5">
<button class="toolbar-btn active"><span class="font-bold">B</span></button>
<button class="toolbar-btn italic font-serif">I</button>
<button class="toolbar-btn underline">U</button>
<button class="toolbar-btn border border-win-blue bg-win-light-blue">S</button>
<button class="toolbar-btn border border-win-blue bg-win-light-blue">O</button>
</div>
<div class="divider"></div>
<div class="flex gap-0.5">
<button class="toolbar-btn"><span class="material-symbols-outlined text-sm">format_align_left</span></button>
<button class="toolbar-btn active border border-win-blue bg-win-light-blue"><span class="material-symbols-outlined text-sm">format_align_center</span></button>
<button class="toolbar-btn"><span class="material-symbols-outlined text-sm">format_align_right</span></button>
</div>
<div class="divider"></div>
<div class="flex gap-0.5">
<button class="toolbar-btn"><span class="material-symbols-outlined text-sm">align_vertical_top</span></button>
<button class="toolbar-btn active border border-win-blue bg-win-light-blue"><span class="material-symbols-outlined text-sm">align_vertical_center</span></button>
<button class="toolbar-btn"><span class="material-symbols-outlined text-sm">align_vertical_bottom</span></button>
</div>
<div class="divider"></div>
<button class="text-win-dark-gray px-2 py-1 text-[11px] hover:text-black">Reset Styles</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex flex-1 overflow-hidden bg-white">
<!-- Left Sidebar -->
<aside class="w-[400px] border-r border-win-border flex flex-col shrink-0 bg-[#f5f5f5]">
<!-- Tabs -->
<div class="flex px-1 pt-1 bg-win-gray border-b border-win-border items-end h-7">
<div class="px-4 py-1 border border-win-border border-b-white bg-white text-[11px] -mb-[1px]">Words</div>
</div>
<div class="flex-1 p-2 overflow-y-auto">
<div class="border border-win-dark-gray h-full bg-white relative">
<!-- Active slide row -->
<div class="flex items-start gap-2 p-1 bg-win-light-blue border-b border-win-light-blue">
<div class="text-[11px] text-win-dark-gray">1</div>
<div class="border border-win-dark-gray bg-[#c0c0c0] w-6 h-4 flex items-center justify-center">
<div class="w-3 h-2 border border-white"></div>
</div>
<div class="flex flex-col text-[11px] italic text-[#a0a0a0] leading-tight">
<span>label</span>
<span>song</span>
</div>
</div>
<!-- Vertical scrollbar simulation -->
<div class="absolute right-0 top-0 bottom-0 w-4 bg-win-gray border-l border-win-border flex flex-col">
<div class="h-4 flex items-center justify-center border-b border-win-border"><span class="material-symbols-outlined text-[10px]">expand_less</span></div>
<div class="flex-1 bg-[#e0e0e0]"></div>
<div class="h-4 flex items-center justify-center border-t border-win-border"><span class="material-symbols-outlined text-[10px]">expand_more</span></div>
</div>
</div>
</div>
<!-- Segment bottom bar -->
<div class="h-8 border-t border-win-border bg-win-gray flex items-center px-1 gap-1">
<div class="flex items-center border border-win-border bg-white h-5 px-1">
<span class="material-symbols-outlined text-[12px]">add</span>
<span class="material-symbols-outlined text-[12px] text-win-dark-gray">arrow_drop_down</span>
</div>
<div class="divider"></div>
</div>
</aside>
<!-- Right Side: Preview -->
<section class="flex-1 bg-[#d0d0d0] flex flex-col p-8 overflow-hidden">
<div class="flex-1 flex items-center justify-center relative">
<!-- Slide Preview -->
<div class="aspect-video w-full max-w-2xl bg-black border border-black shadow-lg flex items-center justify-center">
<h1 class="text-slate-100 text-3xl font-bold tracking-wide">Double click to edit song</h1>
</div>
</div>
<!-- Preview bottom control bar -->
<div class="mt-auto -mx-8 -mb-8 h-10 bg-win-gray border-t border-win-border flex items-center px-2">
<div class="flex items-center h-full border-r border-win-border px-2">
<span class="material-symbols-outlined text-sm text-win-dark-gray">chevron_left</span>
</div>
<div class="flex-1 bg-white h-full mx-0.5 border-r border-l border-win-border relative">
<!-- Scroll handle -->
<div class="absolute inset-0 bg-gradient-to-b from-[#eee] to-[#ddd]"></div>
</div>
<div class="flex items-center h-full border-l border-win-border px-2">
<span class="material-symbols-outlined text-sm text-win-dark-gray">chevron_right</span>
</div>
<div class="divider h-6"></div>
<div class="flex items-center gap-2 px-2 text-[11px] text-win-dark-gray">
<span>Insert</span>
<div class="divider h-4"></div>
<span>25%</span>
<div class="w-32 h-4 bg-white border border-win-border relative">
<div class="absolute left-1/4 top-0 bottom-0 w-3 bg-win-gray border border-win-dark-gray shadow-sm"></div>
</div>
<div class="w-5 h-5 bg-[#c0c0c0] border border-win-dark-gray flex items-center justify-center">
<div class="w-3 h-2 border border-black bg-white"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="bg-win-gray border-t border-white h-12 shrink-0 flex items-center justify-between px-3">
<div class="flex items-center gap-2">
<input class="w-3.5 h-3.5 border-win-dark-gray rounded-none focus:ring-0" type="checkbox"/>
<span class="text-[11px]">Apply changes to items in schedule</span>
</div>
<div class="flex gap-2">
<button class="win-button text-[11px]">Apply</button>
<button class="win-button text-[11px]" onclick="window.close()">OK</button>
<button class="win-button text-[11px]" onclick="window.close()">Cancel</button>
</div>
</footer>
</div>
</body></html>
